<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Conversión de Temperaturas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="card-title mb-3 text-center">Conversión de Temperaturas</h2>
            <p class="text-muted text-center mb-4">Celsius → Fahrenheit / Kelvin</p>

            <div id="alertPlaceholder"></div>

            <div class="mb-3">
              <label for="celsius" class="form-label">Ingresa la temperatura (°C)</label>
              <input id="celsius" class="form-control form-control-lg" placeholder="Ej. 45" inputmode="decimal" />
            </div>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
              <button id="convert" class="btn btn-primary btn-lg">Convertir</button>
              <button id="clear" class="btn btn-outline-secondary btn-lg">Limpiar</button>
            </div>

            <hr class="my-4">

            <div id="resultado" class="text-center">
              <p class="mb-1"><strong id="fText"></strong></p>
              <p class="mb-0"><strong id="kText"></strong></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
